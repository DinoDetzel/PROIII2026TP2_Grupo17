<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Aurora 📽️ - Registro</title>
  <meta name="description" content="Cine Aurora - Registro" />

  <link rel="icon" href="../assets/favicon/logo-cine.png" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

  <!-- HEADER IGUAL AL INDEX -->
  <header class="header">

    <div class="header__logo">
      <h1 class="header__title">Cine Aurora</h1>
      <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora">
    </div>

    <nav class="nav">
      <a href="../index.html">Inicio</a>
      <a href="./estrenos.html">Próximos estrenos</a>
      <a href="../index.html">Volver</a>
    </nav>

  </header>

  <!-- MAIN -->
  <main>

    <section>

      <h2 class="card_title">Crear nueva cuenta</h2>

      <!-- USAMOS CARD COMO EN INDEX -->
      <div class="card" style="max-width: 400px; margin: 40px auto;">

        <form action="login.html">

          <div>
            <label>Nombre Completo</label>
            <input type="text" required />
          </div>

          <div>
            <label>Email</label>
            <input type="email" required />
          </div>

          <div>
            <label>Fecha de nacimiento</label>
            <input type="date" required />
          </div>

          <div>
            <label>Contraseña</label>
            <input type="password" required />
          </div>

          <div>
            <label>Confirmar contraseña</label>
            <input type="password" required />
          </div>

          <hr />

          <h3>Datos para ayudar al cine</h3>
          <p>Estos datos nos ayudan a mejorar tu experiencia.</p>

          <div>
            <label>Color favorito</label>
            <input type="color" />
          </div>

          <div>
            <label>Entradas promedio</label>
            <input type="range" min="0" max="10" />
          </div>

          <div>
            <label>Género favorito</label>
            <select>
              <option>Acción</option>
              <option>Drama</option>
              <option>Ciencia ficción</option>
              <option>Terror</option>
              <option>Comedia</option>
              <option>Romance</option>
            </select>
          </div>

          <div>
            <label>Snack favorito</label><br>

            <input type="radio" name="snack"> Pochoclo dulce
            <input type="radio" name="snack"> Pochoclo salado
            <input type="radio" name="snack"> Chocolate
            <input type="radio" name="snack"> Frutos secos
          </div>

          <br>

          <!-- BOTÓN (usa estilos globales) -->
          <button type="submit">Registrarse</button>

        </form>

      </div>

    </section>

  </main>

  <!-- FOOTER IGUAL -->
  <footer class="footer">
    <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
  </footer>

</body>

</html>
